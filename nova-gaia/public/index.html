<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ANTA: Nova Gaia</title>
    <style>
      :root {
        --bg: #e3c6b8; /* light desaturated terracotta */
        --fg: #1a1a1a;
        --accent: #8a3f2a;
      }
      html, body { height: 100%; }
      body {
        margin: 0; background: var(--bg); color: var(--fg);
        font-family: "Courier New", Courier, monospace; font-size: 18px;
        display: flex; align-items: stretch; justify-content: center;
      }
      .term { max-width: 900px; width: 100%; padding: 24px; }
      .line { white-space: pre-wrap; margin: 8px 0; }
      .prompt { display: flex; gap: 8px; margin-top: 16px; }
      input[type="text"] { flex: 1; padding: 10px; font-family: inherit; font-size: inherit; background: transparent; border: 1px dashed var(--accent); color: var(--fg); }
      button { padding: 10px 14px; font-family: inherit; font-size: inherit; background: transparent; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; }
      .grant { color: var(--accent); text-decoration: underline; cursor: pointer; }
      .hidden { display: none; }
      #logViewer { border: 1px dashed var(--accent); padding: 12px; max-height: 300px; overflow: auto; background: rgba(255,255,255,0.4); white-space: normal; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="term" id="term"></div>
    <script src="/app.js"></script>
  </body>
</html>
